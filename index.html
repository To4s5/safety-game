<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卷包车间 生产丙班 安全隐患“火眼金睛”</title>
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.12.0/dist/av-min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #212529;
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .card {
            background: #ffffff;
            padding: 12px;
            width: 100%;
            flex: 1;
        }
        
        h2 {
            font-size: 24px;
            text-align: center;
            line-height: 1.4;
            margin: 8px 0;
        }
        .slogan-banner {
            background: #d32f2f;
            color: #ffffff;
            padding: 12px;
            font-weight: bold;
            font-size: 20px;
            border-radius: 6px;
            margin: 10px 0 15px 0;
            text-align: center;
        }
        .rule-box h4 { margin: 8px 0; font-size: 18px; color: #000; }
        .rule-box ul { padding-left: 22px; margin: 8px 0; }
        .rule-box li { margin-bottom: 8px; line-height: 1.5; font-size: 16px; color: #495057; }
        
        #game-container {
            position: relative;
            display: block;
            width: 100%;
            margin: 0 auto 6px auto;
            background: #000;
            overflow: hidden;
        }
        .dynamic-game-img {
            display: block;
            width: 100%;
            height: auto;
        }
        .rect-marker {
            position: absolute;
            border: 3.5px solid #d32f2f;
            background-color: rgba(211, 47, 47, 0.22);
            box-sizing: border-box;
            z-index: 10;
        }
        
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }
        .info-item {
            background: #f1f3f5;
            padding: 8px 4px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #dee2e6;
        }
        .progress-highlight { color: #2e7d32; }
        .timer-highlight { color: #d32f2f; }
        
        #message-box {
            margin-top: 2px;
            min-height: 40px;
        }
        .success-tip {
            background: #e8f5e9;
            border-left: 6px solid #2e7d32;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 17px;
            color: #1b5e20;
            line-height: 1.4;
        }
        .hazard-item-tip { margin-bottom: 2px; padding-bottom: 2px; }
        
        .input-group { margin: 20px 0; }
        .input-group label { font-size: 18px; font-weight: bold; }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 18px;
            margin-top: 8px;
        }
        
        .btn-primary {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }

        .btn-next-step {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            margin-top: 4px;
        }
        
        .leaderboard-title { font-weight: bold; color: #333; margin-bottom: 10px; font-size: 18px; text-align: center; }
        .leaderboard-table { width: 100%; border-collapse: collapse; font-size: 16px; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px 4px; text-align: center; border-bottom: 1px solid #dee2e6; }
        .rank-1 { color: #d32f2f; font-weight: bold; }
        .rank-2 { color: #ef6c00; font-weight: bold; }
        .rank-3 { color: #fbc02d; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen" class="card">
            <h2>卷包车间 生产丙班<br>安全隐患“火眼金睛”趣味游戏</h2>
            <div class="slogan-banner">人人讲安全，个个会应急</div>

            <div class="rule-box">
                <h4>📜 参赛须知：</h4>
                <ul>
                    <li>围绕<strong>安全生产月</strong>，点对点排查安全隐患。</li>
                    <li>本游戏总共设置 <strong>5</strong> 关，均取自真实生产现场。</li>
                    <li>请在隐患图片中，直接点击您发现的隐患区域。</li>
                    <li>全部找齐通关，系统将自动累计总用时进行排行。</li>
                </ul>
            </div>
            <div class="input-group">
                <label for="player-name">请输入参赛姓名：</label>
                <input type="text" id="player-name" placeholder="例如：石芙思" autocomplete="off">
            </div>
            <button id="start-btn" class="btn-primary">开始挑战 🚀</button>
        </div>

        <div id="game-screen" class="card" style="display: none;">
            <div class="info-panel">
                <div id="player-display" class="info-item">玩家：-</div>
                <div id="level-display" class="info-item">第 1 / 5 关</div>
                <div id="progress" class="info-item progress-highlight">已找到：0 / 0</div>
                <div id="timer" class="info-item timer-highlight">用时：0 秒</div>
            </div>

            <div id="game-container"></div>

            <div id="message-box">
                <div id="message" style="text-align:center; font-size:16px; font-weight: 500; color:#555; padding: 2px 0;">🎯 请点击图片找出本处隐藏的安全隐患！</div>
            </div>
            
            <div id="action-area" style="display: none;">
                <button id="next-stage-btn" class="btn-next-step">下一关 ➡️</button>
            </div>
        </div>

        <div id="finish-screen" class="card" style="display: none;">
            <div style="background:#2e7d32; color:white; text-align:center; padding:12px; border-radius:6px; font-weight:bold; font-size: 20px; margin-bottom:12px;">🎉 恭喜通关！</div>
            <h3 id="finish-player" style="text-align:center; margin:5px 0; font-size:20px;">参赛员工：-</h3>
            <h2 id="final-time" style="color: #d32f2f; margin: 10px 0; text-align:center; font-size: 26px;">最终通关成绩：- 秒</h2>
            
            <hr style="border: 0; border-top: 1px dashed #ccc; margin: 15px 0;">
            
            <div id="leaderboard-area"></div>
            
            <button onclick="window.location.reload();" style="background:#666; color:white; border:none; padding:14px; font-size:18px; font-weight:bold; border-radius:6px; margin-top: 15px; width: 100%;">再玩一次 🔄</button>
        </div>
    </div>

    <script>
        const LEANCLOUD_APP_ID = "你的AppID"; 
        const LEANCLOUD_APP_KEY = "你的AppKey";
        const LEANCLOUD_SERVER_URL = `https://${LEANCLOUD_APP_ID.substring(0,8).toLowerCase()}.api.lncldglobal.com`;

        let isCloudActive = false;
        if(LEANCLOUD_APP_ID !== "你的AppID") {
            try {
                AV.init({ appId: LEANCLOUD_APP_ID, appKey: LEANCLOUD_APP_KEY, serverURL: LEANCLOUD_SERVER_URL });
                isCloudActive = true;
            } catch(e) { console.error(e); }
        }

        const startScreen = document.getElementById("start-screen");
        const gameScreen = document.getElementById("game-screen");
        const finishScreen = document.getElementById("finish-screen");
        const startBtn = document.getElementById("start-btn");
        const playerNameInput = document.getElementById("player-name");
        const playerDisplay = document.getElementById("player-display");
        const levelDisplay = document.getElementById("level-display");
        const progressDisplay = document.getElementById("progress");
        const timerDisplay = document.getElementById("timer");
        const gameContainer = document.getElementById("game-container");
        const message = document.getElementById("message");
        const finishPlayer = document.getElementById("finish-player");
        const finalTime = document.getElementById("final-time");
        const actionArea = document.getElementById("action-area");
        const nextStageBtn = document.getElementById("next-stage-btn");

        let playerName = ""; let startTime; let timerInterval; let currentLevel = 0; let foundHazards = []; let isLevelCompleted = false;
        let activeImageElement = null;

        // 💡 之后转成 WebP 格式时，记得在这里把 .jpg 统一改成 .webp 
        const levels = [
            { image: "images/photo1.jpg", hazards: [{ xMin: 0.355, yMin: 0.080, xMax: 0.770, yMax: 0.295, title: "警示标识翘边脱落", desc: "“当心触电”安全警示标识脱胶翘起，未起到牢固标识提示作用。" }, { xMin: 0.180, yMin: 0.608, xMax: 0.440, yMax: 0.877, title: "工业插座保护盖未关闭", desc: "区域内多个蓝色及红色插座的保护盖均处于敞开状态，极易积灰受潮或引发触电。" }] },
            { image: "images/photo2.jpg", hazards: [{ xMin: 0.115, yMin: 0.165, xMax: 0.595, yMax: 0.810, title: "消防安全门未关闭", desc: "破支室的常闭式防火消防门处于大开状态，属于消防隐患。" }] },
            { image: "images/photo3.jpg", hazards: [{ xMin: 0.655, yMin: 0.295, xMax: 0.840, yMax: 0.445, title: "现场违规佩戴娱乐耳机", desc: "生产作业人员佩戴蓝牙耳机，无法有效保护听力健康，也会导致分心。" }] },
            { image: "images/photo4.jpg", hazards: [{ xMin: 0.295, yMin: 0.795, xMax: 0.575, yMax: 1.000, title: "机台上遗留内六角扳手", desc: "工具随意搁置在机台表面，有可能因震动滑落卷入机械引发伤害。" }] },
            { image: "images/photo5.jpg", hazards: [{ xMin: 0.400, yMin: 0.095, xMax: 0.680, yMax: 0.295, title: "上方灭火器压力超标", desc: "灭火器指针位于黄色超压区域，长时间高压可能导致瓶体损伤。" }, { xMin: 0.400, yMin: 0.755, xMax: 0.680, yMax: 0.965, title: "下方灭火器压力不足", desc: "灭火器压力表指针明显停留在红色欠压区域，火灾时将无法正常喷射。" }] }
        ];

        // 统一单次访问的版本锁，确保同一次游玩期间节点逻辑连贯
        const sessionVersion = Date.now(); 

        startBtn.addEventListener("click", () => {
            playerName = playerNameInput.value.trim();
            if (playerName === "") { alert("请输入姓名"); return; }
            startScreen.style.display = "none";
            gameScreen.style.display = "block";
            playerDisplay.innerHTML = "玩家：" + playerName;
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            loadLevel(0);
        });

        function updateTimer() {
            if (isLevelCompleted) return;
            const seconds = Math.floor((Date.now() - startTime) / 1000);
            timerDisplay.innerHTML = "用时：" + seconds + " 秒";
        }

        function loadLevel(index) {
            currentLevel = index; foundHazards = []; isLevelCompleted = false;
            gameContainer.innerHTML = ""; 
            actionArea.style.display = "none"; 
            message.className = "";
            
            const level = levels[index];
            
            // 🚀 终极破防缓存逻辑：完全采用“每次动态销毁、创建新节点”
            const newImg = document.createElement("img");
            newImg.className = "dynamic-game-img";
            newImg.alt = "安全隐患图片";
            newImg.setAttribute("draggable", "false");
            
            // 使用当前访问周期的 sessionVersion 锁，既防止串图，又由于图片体积极小，配合后续压缩可以达到秒开
            newImg.src = level.image + "?v=" + sessionVersion + "_" + index;
            
            newImg.addEventListener("click", handleImageClick);
            gameContainer.appendChild(newImg);
            activeImageElement = newImg;
            
            levelDisplay.innerHTML = "第 " + (index + 1) + " / " + levels.length + " 关";
            progressDisplay.innerHTML = "已找到：" + 0 + " / " + level.hazards.length;
            message.innerHTML = "🎯 请点击图片找出本处隐藏的安全隐患！";
        }

        function handleImageClick(e) {
            if (isLevelCompleted) return;
            const rect = activeImageElement.getBoundingClientRect();
            const clickX = (e.clientX - rect.left) / rect.width;
            const clickY = (e.clientY - rect.top) / rect.height;
            const hazards = levels[currentLevel].hazards;
            let hit = false;

            hazards.forEach((h, index) => {
                if (foundHazards.includes(index)) return;
                if (clickX >= h.xMin && clickX <= h.xMax && clickY >= h.yMin && clickY <= h.yMax) {
                    hit = true; foundHazards.push(index);
                    showRectMarker(h.xMin, h.yMin, h.xMax, h.yMax);
                    if (foundHazards.length === 1) message.innerHTML = "";
                    message.className = "success-tip";
                    message.innerHTML += `<div class="hazard-item-tip"><strong>🏆 成功找出：【${h.title}】</strong><br>⚠️ <em>风险：</em>${h.desc}</div>`;
                    progressDisplay.innerHTML = "已找到：" + foundHazards.length + " / " + hazards.length;

                    if (foundHazards.length === hazards.length) {
                        isLevelCompleted = true;
                        nextStageBtn.innerHTML = currentLevel === levels.length - 1 ? "完成挑战 (查看排行) 🏁" : "下一关 ➡️";
                        actionArea.style.display = "block";
                    }
                }
            });

            if (!hit) {
                const errTip = document.createElement("div");
                errTip.style.color = "#d32f2f"; errTip.style.fontSize = "15px"; errTip.style.marginTop = "4px"; errTip.style.textAlign = "center";
                errTip.innerText = "❌ 观察得再仔细一点，此处未发现隐患。";
                const oldErr = message.querySelector(".click-error-temp");
                if(oldErr) oldErr.remove();
                errTip.className = "click-error-temp";
                message.appendChild(errTip);
            }
        }

        nextStageBtn.addEventListener("click", () => {
            if (currentLevel === levels.length - 1) { finishGame(); } else { loadLevel(currentLevel + 1); }
        });

        function showRectMarker(xMin, yMin, xMax, yMax) {
            const rectMarker = document.createElement("div");
            rectMarker.className = "rect-marker";
            rectMarker.style.left = (xMin * 100) + "%"; rectMarker.style.top = (yMin * 100) + "%";
            rectMarker.style.width = ((xMax - xMin) * 100) + "%"; rectMarker.style.height = ((yMax - yMin) * 100) + "%";
            gameContainer.appendChild(rectMarker);
        }

        function finishGame() {
            clearInterval(timerInterval); gameScreen.style.display = "none"; finishScreen.style.display = "block";
            const totalSeconds = Math.floor((Date.now() - startTime) / 1000);
            finishPlayer.innerHTML = "参赛员工：" + playerName;
            finalTime.innerHTML = "最终通关成绩： " + totalSeconds + " 秒";
            handleLeaderboard(playerName, totalSeconds);
        }

        function handleLeaderboard(name, time) {
            if(isCloudActive) {
                document.getElementById("leaderboard-area").innerHTML = "<p style='text-align:center;font-size:16px;color:#666;'>正在加载联网实时大排行...</p>";
                const ScoreRound = AV.Object.extend('ScoreRound');
                const scoreItem = new ScoreRound();
                scoreItem.set('username', name); scoreItem.set('scoreTime', time);
                scoreItem.save().then(() => {
                    const query = new AV.Query('ScoreRound');
                    query.ascending('scoreTime'); query.limit(10);
                    return query.find();
                }).then((results) => {
                    let rowsHtml = "";
                    results.forEach((item, idx) => {
                        let rankClass = idx < 3 ? `rank-${idx + 1}` : "";
                        rowsHtml += `<tr><td class="${rankClass}">第 ${idx + 1} 名</td><td><strong>${item.get('username')||"匿名"}</strong></td><td style="color:#d32f2f;font-weight:bold;">${item.get('scoreTime')} 秒</td></tr>`;
                    });
                    renderTableHTML(rowsHtml);
                }).catch(() => { useLocalFallback(name, time); });
            } else {
                useLocalFallback(name, time);
            }
        }

        function useLocalFallback(name, time) {
            let scores = JSON.parse(localStorage.getItem("safety_leaderboard")) || [];
            const existingIndex = scores.findIndex(item => item.name === name);
            if (existingIndex > -1) { if (time < scores[existingIndex].time) { scores[existingIndex].time = time; } } 
            else { scores.push({ name: name, time: time }); }
            scores.sort((a, b) => a.time - b.time);
            localStorage.setItem("safety_leaderboard", JSON.stringify(scores));
            
            let rowsHtml = "";
            scores.slice(0, 10).forEach((item, idx) => {
                let rankClass = idx < 3 ? `rank-${idx + 1}` : "";
                rowsHtml += `<tr><td class="${rankClass}">第 ${idx + 1} 名</td><td><strong>${item.name}</strong></td><td style="color:#d32f2f;font-weight:bold;">${item.time} 秒</td></tr>`;
            });
            renderTableHTML(rowsHtml);
        }

        function renderTableHTML(rowsHtml) {
            document.getElementById("leaderboard-area").innerHTML = `
                <div class="leaderboard-title">📊 “火眼金睛” · 实时排行榜</div>
                <table class="leaderboard-table">
                    <thead><tr><th>名次</th><th>姓名</th><th>时间</th></tr></thead>
                    <tbody>${rowsHtml || '<tr><td colspan="3" style="text-align:center;">暂无记录数据</td></tr>'}</tbody>
                </table>`;
        }
    </script>
</body>
</html>
